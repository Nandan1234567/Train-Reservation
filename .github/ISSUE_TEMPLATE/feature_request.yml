name: Feature Request
description: Suggest a new feature or enhancement.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the proposal! Please keep in mind the project's [MVP scope](../blob/main/README.md#-project-scope-mvp-boundaries) — features outside scope are welcome in the backlog, but will not block MVP.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched [existing issues](../issues?q=is%3Aissue) and did not find a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Is it tied to a real pain point you have encountered?
      placeholder: Users have no way to view their past reservations after cancellation, which makes it hard to reason about their booking history.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen. Include an API shape if relevant.
      placeholder: |
        Add `GET /reservations?passengerId=...` with an optional `status` filter, returning a paginated list of all reservations for that passenger.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered, and why you set them aside.

  - type: dropdown
    id: scope
    attributes:
      label: How does this fit the MVP?
      options:
        - Required for MVP
        - Nice to have before MVP
        - Post-MVP / backlog
        - Not sure
    validations:
      required: true

  - type: textarea
    id: domain-impact
    attributes:
      label: Domain or architecture impact
      description: Does this introduce new aggregates, domain events, or cross-cutting concerns? Flag anything that might affect Clean Architecture layering or the concurrency model.

  - type: textarea
    id: additional
    attributes:
      label: Additional context