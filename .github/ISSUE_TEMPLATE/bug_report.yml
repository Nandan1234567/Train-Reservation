name: Bug Report
description: Report something that isn't working correctly.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please fill out the fields below so we can reproduce and fix it quickly.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      description: Please confirm the following before opening the issue.
      options:
        - label: I searched [existing issues](../issues?q=is%3Aissue) and did not find a duplicate.
          required: true
        - label: I am running against the latest `main` branch.
          required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I call POST /reservations with overlapping seats, the second request hangs instead of returning 409.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact steps to trigger the issue. Include request bodies, endpoints, and any relevant state.
      placeholder: |
        1. Start the API: `docker-compose up -d && dotnet run --project TrainBooking.Api`
        2. Send POST /reservations with `{ "tripId": "...", "seatIds": [1, 2] }`
        3. From a second terminal, send the same request before the first completes
        4. Observe the second request hanging for ~30 seconds
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The second request should return 409 Conflict within a few hundred milliseconds.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The second request hangs until the lock timeout, then returns 500 with "SqlException".
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack trace
      description: Any error output, Serilog entries, or SQL errors. Paste inside the block — it will render as text.
      render: text

  - type: input
    id: dotnet-version
    attributes:
      label: .NET SDK version
      description: Output of `dotnet --version`.
      placeholder: "10.0.100"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: sql-server
    attributes:
      label: SQL Server image
      description: Docker image tag, if the bug involves the database.
      placeholder: "mcr.microsoft.com/mssql/server:2022-latest"

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, related issues, theories about the root cause.